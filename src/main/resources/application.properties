spring.application.name=wordify-be

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:wordify}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.error.include-message=always

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

ollama.api.base-url=${OLLAMA_API_BASE_URL:https://ollama.com}
ollama.api.chat-path=${OLLAMA_API_CHAT_PATH:/api/chat}
ollama.api.model=${OLLAMA_API_MODEL:gpt-oss:120b}
ollama.api.think=${OLLAMA_API_THINK:low}
ollama.api.authorization-token=${OLLAMA_API_AUTH_TOKEN:}
ollama.api.cookie=${OLLAMA_API_COOKIE:}
