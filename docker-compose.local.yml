services:
  db:
    image: postgres:17
    container_name: postgre_local_db_wordify
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data_local:/var/lib/postgresql/data

volumes:
  db_data_local:
