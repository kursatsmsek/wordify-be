name: Build -> Docker -> Push -> Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  IMAGE_BASE: ghcr.io/${{ secrets.GHCR_USERNAME }}/wordify-be

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build JAR and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven local repo
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build Spring Boot JAR (skip tests)
        run: ./mvnw -B clean package -Dmaven.test.skip=true

      - name: Prepare runtime Dockerfile
        run: |
          cat > Dockerfile.runtime <<'EOF'
          FROM eclipse-temurin:21-jre-alpine
          WORKDIR /app
          COPY target/*.jar app.jar
          EXPOSE 8080
          ENTRYPOINT ["java","-jar","/app/app.jar"]
          EOF

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          docker build -f Dockerfile.runtime -t ${IMAGE_BASE}:${SHORT_SHA} .
          docker tag ${IMAGE_BASE}:${SHORT_SHA} ${IMAGE_BASE}:latest

      - name: Push image (sha)
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          docker push ${IMAGE_BASE}:${SHORT_SHA}

      - name: Push image (latest)
        run: docker push ${IMAGE_BASE}:latest

  deploy:
    name: Deploy to Production Server
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          script: |
            set -e
            DEPLOY_DIR="${{ vars.WORDIFY_BE_DEPLOY_DIR }}"
            if [ -z "$DEPLOY_DIR" ]; then
              DEPLOY_DIR="/opt/wordify-be"
            fi
            cd "$DEPLOY_DIR"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose pull
              docker-compose up -d --remove-orphans
            else
              docker compose pull
              docker compose up -d --remove-orphans
            fi
